# =============================================================================
# Velocity RGS - single consolidated configuration.
#
# Everything is driven by the two switches at the top of the `rgs:` block. No
# Spring profiles are used for wiring anymore - flip a value here (or override
# with the matching env var / -Dproperty) and restart.
#
#   rgs.mode          demo | production
#     demo        ->  dev-token, QA admin and RTP simulator endpoints are
#                     registered, the in-process wallet auto-seeds new players,
#                     and swagger/actuator/dev paths are public (zero auth setup
#                     needed - ideal for the embedded UI and fast iteration).
#     production  ->  those helpers are NOT registered; only health probes are
#                     public. Everything else requires a valid JWT.
#
#   rgs.wallet.mode   internal | operator
#     internal    ->  in-process demo wallet, no external calls (default).
#     operator    ->  calls a real external operator wallet over HTTP using the
#                     rgs.wallet.operator.* settings below.
#
# Defaults = demo + internal: clone, run, and you get a fully working demo with
# no external wallet dependency.
# =============================================================================
spring:
  application:
    name: velocity-rgs
  output:
    ansi:
      # Force colored console output even when the process is forked (e.g. via
      # `mvn spring-boot:run`), where ANSI auto-detection would otherwise disable
      # it. Only affects the human-readable console pattern; JSON logs are unaffected.
      enabled: ${RGS_LOG_ANSI:always}
  main:
    web-application-type: servlet
  web:
    resources:
      # Demo/dev: never let the browser cache the embedded UI assets, so edits to
      # the static lobby/game files show up on a plain refresh while iterating.
      cache:
        cachecontrol:
          no-store: true
  threads:
    virtual:
      enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    url: ${RGS_DB_URL:jdbc:postgresql://localhost:5432/rgs}
    username: ${RGS_DB_USERNAME:rgs}
    password: ${RGS_DB_PASSWORD:rgs}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${RGS_REDIS_HOST:localhost}
      port: ${RGS_REDIS_PORT:6379}
      timeout: 2s

server:
  port: ${RGS_SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

rgs:
  # ----- run mode ----------------------------------------------------------
  # demo (default) | production. See the header block above.
  mode: ${RGS_MODE:demo}

  security:
    jwt-secret: ${RGS_JWT_SECRET:change-me-change-me-change-me-change-me-32b}
    jwt-issuer: velocity-rgs
    cors-allowed-origins:
      - ${RGS_CORS_ALLOWED_ORIGIN:http://localhost:5173}
    # Demo-friendly defaults: the dev-token endpoint, swagger and actuator are
    # anonymous so the embedded UI and QA tooling work with no auth setup.
    # For production, trim this down to just the health probes, e.g.:
    #   public-paths:
    #     - /actuator/health/liveness
    #     - /actuator/health/readiness
    public-paths:
      - /actuator/health
      - /actuator/info
      - /actuator/prometheus
      - /v3/api-docs
      - /v3/api-docs/**
      - /swagger-ui.html
      - /swagger-ui/**
      - /api/v1/dev/**
      - /api/v1/games
      # Public round-replay links (§3.1). Anonymous by design and NOT a demo-mode concession: the
      # endpoint takes a signed token that names the one round it may read, and answers with a payload
      # carrying no player or session id. Keep this entry when trimming the list for production.
      - /api/v1/public/**

  replay:
    # Lifetime of a shared public replay link. Long enough to survive being emailed and opened the next
    # morning; short enough that one pasted somewhere public stops working. Links are stateless, so
    # shortening this only affects links minted afterwards - to kill outstanding ones, rotate
    # rgs.security.jwt-secret.
    public-link-ttl: ${RGS_REPLAY_LINK_TTL:24h}

  idempotency:
    redis-cache-enabled: true
    default-ttl-hours: 24
    wallet-ttl-hours: 48

  wallet:
    # internal (default) | operator. See the header block above.
    mode: ${RGS_WALLET_MODE:internal}
    demo:
      starting-balance-minor: 1000000
      currency: EUR
    # Only used when rgs.wallet.mode=operator.
    operator:
      base-url: ${RGS_WALLET_OPERATOR_URL:http://localhost:9090}
      timeout-ms: 2000
      auth-token: ${RGS_WALLET_OPERATOR_TOKEN:}

  simulator:
    # The RtpSimulator CLI runner fires one batch RTP run on startup. Off by
    # default; set true (or RGS_SIMULATOR_CLI_ENABLED=true) for a dedicated
    # simulation run. The /api/v1/admin/simulator/run endpoint is independent
    # and is available whenever rgs.mode=demo.
    cli-enabled: ${RGS_SIMULATOR_CLI_ENABLED:false}
    spins: 100000

  math:
    catalog:
      - gameId: aztec-fire
        mathVersion: v1
      - gameId: frost-crown
        mathVersion: v1
      - gameId: inferno-riches
        mathVersion: v1
      # 243-ways game (winModel: WAYS). The others are payline games.
      - gameId: jade-tiger
        mathVersion: v1
      # Cascading reels (math.cascades): wins are cleared and refilled, each tumble in the same
      # spin paying at a higher multiplier.
      - gameId: gilded-cascade
        mathVersion: v1
      # Hold & Spin respins (math.respins): coins lock, the counter resets on every catch, and a
      # full grid pays the GRAND jackpot.
      - gameId: dragon-hoard
        mathVersion: v1

  # Roulette games (additive - an empty/absent list boots with slots only).
  roulette:
    catalog:
      - gameId: european-roulette
        mathVersion: v1

  # Blackjack games (additive - an empty/absent list boots without card games).
  blackjack:
    catalog:
      - gameId: classic-blackjack
        mathVersion: v1

logging:
  level:
    root: INFO
    com.velocity.rgs: INFO
