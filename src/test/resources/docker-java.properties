# docker-java configuration (test classpath only).
#
# Docker Engine 29+ raised the minimum negotiable API version to 1.40 and rejects
# older clients with HTTP 400 ("client version is too old"). The docker-java client
# bundled in Testcontainers defaults to API v1.32, so Testcontainers fails to detect
# Docker on machines running Docker Desktop / Engine 29+ with:
#     "Could not find a valid Docker environment ... BadRequestException (Status 400)"
#
# Pinning api.version to a value the modern daemon accepts (>= 1.40) restores
# detection. 1.44 is widely supported and well within Docker 29's range (min 1.40,
# current 1.55). docker-java reads this from a classpath `docker-java.properties`.
#
# Refs: testcontainers/testcontainers-java#11212, #11422
api.version=1.44
