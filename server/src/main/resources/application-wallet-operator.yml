rgs:
  security:
    # Operator/production profile: only the liveness probe is anonymous.
    # Prometheus and info require a valid JWT (typically scraped via a side-car
    # that injects a long-lived ADMIN token from a vault).
    public-paths:
      - /actuator/health/liveness
      - /actuator/health/readiness
  wallet:
    mode: operator
    operator:
      base-url: ${RGS_WALLET_OPERATOR_URL:http://localhost:9090}
      timeout-ms: 2000
