<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velocity RGS — Lobby</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="lobby-page">
  <header class="topbar">
    <div class="brand">
      <span class="logo">🎰</span>
      <div>
        <h1>Velocity RGS</h1>
        <p class="subtitle">Game Lobby — Demo Test Harness</p>
      </div>
    </div>
    <div class="session-info">
      <div class="pill">
        <span class="pill-label">Mode</span>
        <span class="pill-value">Demo</span>
      </div>
    </div>
  </header>

  <main class="lobby">
    <h2 class="lobby-title">Choose your game</h2>
    <p class="lobby-sub">
      Three games, one certified <strong>96% RTP</strong> — each tuned to a different
      volatility and max-win ceiling. Pick your risk.
    </p>
    <div id="gameGrid" class="game-grid">
      <p class="lobby-loading">Loading games…</p>
    </div>
  </main>

  <script src="/games.js"></script>
  <script src="/lobby.js"></script>
</body>
</html>
