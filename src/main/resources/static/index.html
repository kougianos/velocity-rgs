<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Pinch-zoom left enabled (no maximum-scale / user-scalable=no) for accessibility. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velocity - Play</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preload" href="/fonts/archivo-expanded.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/geist-mono.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="lobby-page">
  <header class="vx-top">
    <div class="vx-top-inner">
      <a class="vx-brand" href="/">
        <span class="vx-mark" aria-hidden="true"></span>
        <span class="vx-wordmark">VELO<b>CITY</b></span>
      </a>
      <nav class="vx-nav" aria-label="Primary">
        <a href="/" class="on" aria-current="page">Lobby</a>
        <a href="/history.html">History</a>
        <a href="/rg.html">Responsible Gaming</a>
      </nav>
      <span class="vx-build" title="Environment">Demo build</span>
    </div>
  </header>

  <main class="vx-main" id="lobbyRoot">
    <!-- Loading skeleton - replaced by lobby.js once the catalog resolves. -->
    <div id="lobbyLoading" aria-hidden="true">
      <div class="vx-skel vx-skel-hero"></div>
      <div class="vx-skel-grid">
        <div class="vx-skel vx-skel-card"></div>
        <div class="vx-skel vx-skel-card"></div>
        <div class="vx-skel vx-skel-card"></div>
      </div>
    </div>
    <p class="vx-lab" style="position:absolute;left:-9999px" role="status">Loading games…</p>
  </main>

  <footer class="vx-foot">
    <div class="vx-foot-inner">
      <span class="item"><span class="dot"></span>Certified server-side RNG</span>
      <span class="item"><span class="dot"></span>Fully auditable rounds</span>
      <span class="spacer"></span>
      <span class="item">Play responsibly · 18+</span>
    </div>
  </footer>

  <script src="/games.js"></script>
  <script src="/lobby.js"></script>
</body>
</html>
