<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velocity RGS — Game</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a href="/" class="back-link" title="Back to lobby">‹</a>
        <span class="logo" id="brandLogo">🔥</span>
        <div>
          <h1 id="gameName">Velocity RGS</h1>
          <p class="subtitle" id="gameTagline">Demo Test Harness</p>
        </div>
      </div>
      <nav class="topnav">
        <a href="/" class="topnav-link">Lobby</a>
        <a href="/history.html" class="topnav-link">History</a>
      </nav>
      <div class="topbar-right"></div>
    </div>
  </header>

  <main class="layout">
    <!-- ===== Game column ===== -->
    <section class="panel game-panel">
      <h2 class="panel-title">
        Reels
        <button id="showInfo" class="btn btn-ghost info-btn">
          <svg class="info-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9.25" fill="none" stroke="currentColor" stroke-width="1.6" />
            <circle cx="12" cy="7.6" r="1.15" fill="currentColor" />
            <rect x="11" y="10.5" width="2" height="7" rx="1" fill="currentColor" />
          </svg>
          <span>Show Game Info</span>
        </button>
      </h2>

      <div id="reels" class="reels" aria-label="Slot grid"></div>

      <div id="winBanner" class="win-banner is-empty">
        <span class="win-label">WIN</span>
        <span id="winAmount" class="win-amount">0.00</span>
      </div>

      <div class="controls">
        <div class="control-group bet-control" id="betControl">
          <label for="betSlider">Bet <strong id="betValue" class="bet-value">—</strong></label>
          <input id="betSlider" class="bet-slider" type="range" min="0" max="0" step="1" value="0" />
          <div class="bet-scale">
            <span id="betMin">—</span>
            <span id="betMax">—</span>
          </div>
          <small id="betPowerHint" class="bet-power-hint hidden">
            Power Bet ×<span id="betPowerMult">1.5</span> = <span id="betEffective">—</span>
          </small>
        </div>

        <label class="toggle" id="powerBetToggle">
          <input id="powerBet" type="checkbox" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-text">Power Bet <small>(×<span id="powerBetMultLabel">1.5</span> stake)</small></span>
        </label>

        <button id="spinBtn" class="btn btn-primary btn-spin">SPIN</button>
      </div>

      <div class="feature-actions">
        <button id="buyFreeSpins" class="btn btn-buy" data-buy="FREE_SPINS_BUY">
          Buy Free Spins <small id="buyFreeSpinsCost">(×—)</small>
        </button>
        <button id="startFeature" class="btn btn-accent hidden">Start Feature</button>
      </div>

      <!-- Pick & Collect board -->
      <div id="pickPanel" class="pick-panel hidden">
        <h3>Pick &amp; Collect</h3>
        <p class="pick-meta">
          Collected: <strong id="pickCollected">0.00</strong> ·
          Total Win: <strong id="pickTotal">0.00</strong> ·
          Picks left: <strong id="pickRemaining">0</strong>
        </p>
        <div id="pickBoard" class="pick-board"></div>
      </div>

      <div id="winLines" class="win-lines"></div>
    </section>

    <!-- ===== Tools column ===== -->
    <aside class="side">
      <!-- Session -->
      <section class="panel session-panel">
        <h2 class="panel-title">Session</h2>
        <div class="session-grid">
          <div class="pill balance">
            <span class="pill-label">Balance</span>
            <span id="balance" class="pill-value">—</span>
          </div>
          <div class="pill">
            <span class="pill-label">State</span>
            <span id="gameState" class="pill-value">—</span>
          </div>
          <div class="pill">
            <span class="pill-label">Free Spins</span>
            <span id="freeSpins" class="pill-value">0</span>
          </div>
        </div>
        <button id="resetSession" class="btn btn-ghost full" title="Start a brand new demo player">New Player</button>
      </section>

      <!-- Simulator -->
      <section class="panel">
        <h2 class="panel-title">RTP Simulator</h2>
        <div class="form-grid">
          <label class="sim-bet" for="simSlider">
            <span class="sim-bet-row">Bet <strong id="simBetValue" class="bet-value">—</strong></span>
            <input id="simSlider" class="bet-slider" type="range" min="0" max="0" step="1" value="0" />
            <span class="bet-scale">
              <span id="simBetMin">—</span>
              <span id="simBetMax">—</span>
            </span>
          </label>
          <label>Base spins
            <input id="simBase" type="number" min="0" step="1000" value="100000" />
          </label>
          <label>Power-bet spins
            <input id="simPower" type="number" min="0" step="1000" value="0" />
          </label>
          <label>Free-spin buys
            <input id="simFs" type="number" min="0" step="100" value="0" />
          </label>
          <label>
            <span class="label-row">
              Pick strategy
              <span class="info" tabindex="0" aria-label="Pick strategy help">
                <svg class="info-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="9.25" fill="none" stroke="currentColor" stroke-width="1.6" />
                  <circle cx="12" cy="7.6" r="1.15" fill="currentColor" />
                  <rect x="11" y="10.5" width="2" height="7" rx="1" fill="currentColor" />
                </svg>
                <span class="tooltip" role="tooltip">
                  <strong>How the simulator opens Pick &amp; Collect tiles:</strong>
                  <span><b>RANDOM_UNOPENED</b> — picks a random tile that hasn't been
                  opened yet. Models a typical player clicking around at random.</span>
                  <span><b>SEQUENTIAL</b> — opens tiles in board order, continuing from the
                  last tile opened (1, 2, 3 …). Deterministic sweep of the board.</span>
                  <span><b>COLLECT_FIRST</b> — always opens the lowest-index unopened tile
                  (restarting the scan from the top each pick). A fixed, repeatable order.</span>
                  <em>Tile values are fully random, so the strategy never changes the RTP —
                  it only controls the order tiles are revealed.</em>
                </span>
              </span>
            </span>
            <select id="simStrategy">
              <option value="RANDOM_UNOPENED">RANDOM_UNOPENED</option>
              <option value="SEQUENTIAL">SEQUENTIAL</option>
              <option value="COLLECT_FIRST">COLLECT_FIRST</option>
            </select>
          </label>
        </div>
        <button id="runSim" class="btn btn-accent full">Run Simulation</button>
        <div id="simReport" class="sim-report"></div>
      </section>

      <!-- Request / response log -->
      <section class="panel">
        <h2 class="panel-title">
          Last Request / Response
          <button id="clearLog" class="btn btn-ghost tiny">clear</button>
        </h2>
        <pre id="log" class="log">Booting demo session…</pre>
      </section>
    </aside>
  </main>

  <div id="toast" class="toast hidden"></div>

  <!-- Game info modal — spans the reels + simulator width over the main game area -->
  <div id="infoModal" class="info-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
    <div class="info-card">
      <button id="infoClose" class="info-close" aria-label="Close game info">×</button>
      <header class="info-head">
        <span class="info-logo" id="infoLogo">🔥</span>
        <div>
          <h2 class="info-title" id="infoTitle">Game</h2>
          <p class="info-tagline" id="infoTagline"></p>
        </div>
      </header>
      <div class="info-stats" id="infoStats"></div>
      <div class="info-body" id="infoParagraphs"></div>
      <div class="info-specs" id="infoSpecs"></div>
    </div>
  </div>

  <!-- Free-spins intro / summary dialog -->
  <div id="fsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="fsModalTitle">
    <div class="modal-card">
      <div id="fsModalIcon" class="modal-icon">🎁</div>
      <h3 id="fsModalTitle">Free Spins</h3>
      <p id="fsModalMessage" class="modal-message"></p>
      <div class="modal-actions">
        <button id="fsModalCancel" class="btn btn-ghost">Later</button>
        <button id="fsModalConfirm" class="btn btn-primary">Start</button>
      </div>
    </div>
  </div>

  <script src="/games.js"></script>
  <script src="/app.js"></script>
</body>
</html>
