<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Velocity RGS — Lobby</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="lobby-page">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="logo">🎰</span>
        <div>
          <h1>Velocity RGS</h1>
          <p class="subtitle">Game Lobby - Demo Test Harness</p>
        </div>
      </div>
      <nav class="topnav">
        <a href="/" class="topnav-link is-active">Lobby</a>
        <a href="/history.html" class="topnav-link">History</a>
      </nav>
      <div class="topbar-right">
        <div class="pill">
          <span class="pill-label">Mode</span>
          <span class="pill-value">Demo</span>
        </div>
      </div>
    </div>
  </header>

  <main class="lobby">
    <h2 class="lobby-title">Choose your game</h2>
    <p class="lobby-sub">
      Three <strong>96% RTP</strong> slots, each tuned to a different volatility and
      max-win ceiling — plus the timeless <strong>97.30% RTP</strong> European Roulette wheel.
      Pick your game.
    </p>
    <div id="gameGrid" class="lobby-sections">
      <p class="lobby-loading">Loading games…</p>
    </div>
  </main>

  <script src="/games.js"></script>
  <script src="/lobby.js"></script>
</body>
</html>
