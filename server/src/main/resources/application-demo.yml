rgs:
  security:
    # Demo profile whitelists the dev-token endpoint so callers can mint a JWT
    # without already holding one. Never enable this on a non-demo deployment.
    public-paths:
      - /actuator/health
      - /actuator/info
      - /actuator/prometheus
      - /v3/api-docs
      - /v3/api-docs/**
      - /swagger-ui.html
      - /swagger-ui/**
      - /api/v1/dev/**
  wallet:
    mode: internal
    demo:
      starting-balance-minor: 1000000
      currency: EUR
  simulator:
    expose-on-demo: true
