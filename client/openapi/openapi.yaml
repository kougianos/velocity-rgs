openapi: 3.0.3
info:
  title: Velocity RGS API
  description: |
    Remote Gaming Server: Slot Engine + Wallet.

    This spec is the client-side mirror of the server contract. It is hand-curated
    from the Java records under `server/src/main/java/com/velocity/rgs/**` and
    Appendix A of `client/client-requirements.md`. When the server begins emitting
    `server/docs/openapi.yaml` (via the `openapi` Maven profile), that file
    replaces this one verbatim — see `client/openapi/gap-report.md`.
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local demo profile
security:
  - bearerJwt: []
tags:
  - name: slot
    description: Slot game engine (init, spin, feature lifecycle)
  - name: wallet
    description: Player wallet (balance, debit, credit, rollback)
  - name: admin
    description: QA / operator administration (ADMIN role required)
  - name: dev
    description: Demo-only helpers (token minting) — gated to the demo profile
paths:
  /api/v1/slot/init:
    post:
      operationId: slotInit
      tags: [slot]
      summary: Initialize or resume a slot session
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlotInitRequest'
      responses:
        '200':
          description: Session snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotInitResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/slot/spin:
    post:
      operationId: slotSpin
      tags: [slot]
      summary: Execute a single spin
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpinRequest'
      responses:
        '200':
          description: Spin outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpinResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/slot/feature/start:
    post:
      operationId: slotFeatureStart
      tags: [slot]
      summary: Start an awaiting feature (Free Spins or Pick & Collect)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureStartRequest'
      responses:
        '200':
          description: Feature loop entered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureStartResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/slot/feature/buy:
    post:
      operationId: slotFeatureBuy
      tags: [slot]
      summary: Buy entry into a feature
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureBuyRequest'
      responses:
        '200':
          description: Feature purchased
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureBuyResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/slot/feature/pick:
    post:
      operationId: slotFeaturePick
      tags: [slot]
      summary: Pick a tile in a Pick & Collect loop
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeaturePickRequest'
      responses:
        '200':
          description: Pick result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturePickResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/wallet/authenticate:
    post:
      operationId: walletAuthenticate
      tags: [wallet]
      summary: Player / wallet eligibility check
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletAuthenticateRequest'
      responses:
        '200':
          description: Authentication result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletAuthenticateResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/wallet/balance:
    get:
      operationId: walletBalance
      tags: [wallet]
      summary: Read the authenticated player's wallet balance
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Current balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalanceResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/wallet/debit:
    post:
      operationId: walletDebit
      tags: [wallet]
      summary: Debit the player's wallet
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletDebitRequest'
      responses:
        '200':
          description: Debit accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletDebitResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/wallet/credit:
    post:
      operationId: walletCredit
      tags: [wallet]
      summary: Credit the player's wallet
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletCreditRequest'
      responses:
        '200':
          description: Credit accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletCreditResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/wallet/rollback:
    post:
      operationId: walletRollback
      tags: [wallet]
      summary: Roll back a prior transaction
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletRollbackRequest'
      responses:
        '200':
          description: Rollback accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletRollbackResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/admin/replay/{roundId}:
    post:
      operationId: adminReplayRound
      tags: [admin]
      summary: Re-execute a stored round and report deterministic outcome
      parameters:
        - in: path
          name: roundId
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Reconstructed round outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoundReplayResult'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/admin/wallet/balance:
    post:
      operationId: adminSetBalance
      tags: [admin]
      summary: Set a player wallet balance (QA / demo)
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetBalanceRequest'
      responses:
        '200':
          description: Persisted balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetBalanceResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/admin/session/{playerId}:
    get:
      operationId: adminGetSession
      tags: [admin]
      summary: Inspect the current session for a player
      parameters:
        - in: path
          name: playerId
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Session snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInspection'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/admin/round/{roundId}:
    get:
      operationId: adminGetRound
      tags: [admin]
      summary: Inspect a persisted round
      parameters:
        - in: path
          name: roundId
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Round inspection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoundInspection'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/admin/simulator/run:
    post:
      operationId: adminSimulatorRun
      tags: [admin]
      summary: Run an RTP simulation job
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RtpSimulationRequest'
      responses:
        '200':
          description: Simulation report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RtpReport'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
  /api/v1/dev/token:
    post:
      operationId: devToken
      tags: [dev]
      summary: Mint a demo JWT (demo profile only)
      security: []
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevTokenRequest'
      responses:
        '200':
          description: Minted token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevTokenResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: Not available in the active profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
components:
  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      description: RFC 4122 v4 UUID. Same key on transport retry; new key per user intent.
      schema:
        type: string
        format: uuid
    XTraceId:
      in: header
      name: X-Trace-Id
      required: false
      description: Optional UUID v4 for correlation; server echoes it on every response.
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Authenticated but lacking required role / scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: State, session, or wallet conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalError:
      description: Unhandled server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    # ----------------------------------------------------------------- enums
    GameState:
      type: string
      enum:
        - BASE_GAME
        - FREE_SPINS_AWAITING
        - FREE_SPINS_LOOP
        - PICK_COLLECT_AWAITING
        - PICK_COLLECT_LOOP
    GameCommand:
      type: string
      enum:
        - SPIN
        - START_FREE_SPINS
        - START_PICK_COLLECT
        - BUY_FEATURE
        - PICK
    FeatureType:
      type: string
      enum:
        - FREE_SPINS
        - PICK_COLLECT
    BonusBuyType:
      type: string
      enum:
        - FREE_SPINS_BUY
        - PICK_COLLECT_BUY
    PickTileType:
      type: string
      enum:
        - CREDITS
        - MULTIPLIER
        - COLLECT
        - BLANK
        - END
    PickCollectStatus:
      type: string
      enum:
        - IN_PROGRESS
        - COLLECTED
        - ENDED
    WalletTransactionType:
      type: string
      enum:
        - BET
        - BONUS_BUY
        - WIN
        - FEATURE_WIN
        - ROLLBACK
    WalletTransactionStatus:
      type: string
      enum:
        - SUCCESS
        - REJECTED
    RollbackReason:
      type: string
      enum:
        - DOWNSTREAM_FAILURE
        - TECHNICAL_ERROR
        - OPERATOR_CANCEL
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - AUTH_FAILED
        - FORBIDDEN_ACTION
        - SESSION_NOT_FOUND
        - ILLEGAL_STATE_TRANSITION
        - SESSION_VERSION_CONFLICT
        - IDEMPOTENCY_KEY_CONFLICT
        - DUPLICATE_TRANSACTION
        - INSUFFICIENT_FUNDS
        - ORIGINAL_TRANSACTION_NOT_FOUND
        - CURRENCY_MISMATCH
        - BONUS_BUY_DISABLED
        - MAX_WIN_REACHED
        - INTERNAL_ERROR
    PickStrategy:
      type: string
      enum:
        - SEQUENTIAL
        - RANDOM_UNOPENED
        - COLLECT_FIRST

    # ----------------------------------------------------------------- common
    Money:
      type: number
      format: double
      description: |
        Monetary amount in major units. JSON encodes BigDecimal as a JSON number.
        The client wraps these via `Money` (decimal.js-light) and never reads them
        as `Number` for arithmetic.
    FieldViolation:
      type: object
      required: [field, reason]
      properties:
        field: { type: string }
        reason: { type: string }
    ApiError:
      type: object
      required: [code, message, httpStatus, traceId, timestamp]
      properties:
        code: { $ref: '#/components/schemas/ErrorCode' }
        message: { type: string }
        httpStatus: { type: integer, format: int32 }
        traceId: { type: string }
        timestamp: { type: string, format: date-time }
        details:
          type: array
          items: { $ref: '#/components/schemas/FieldViolation' }

    # --------------------------------------------------- pick & collect view
    RevealedPick:
      type: object
      required: [position, tileType, value]
      properties:
        position: { type: integer, format: int32 }
        tileType: { $ref: '#/components/schemas/PickTileType' }
        value: { $ref: '#/components/schemas/Money' }
    PickCollectFeatureView:
      type: object
      required:
        - boardSize
        - openedPositions
        - revealedPicks
        - currentCollected
        - totalFeatureWin
        - remainingPicks
        - status
      properties:
        boardSize: { type: integer, format: int32 }
        openedPositions:
          type: array
          items: { type: integer, format: int32 }
        revealedPicks:
          type: array
          items: { $ref: '#/components/schemas/RevealedPick' }
        currentCollected: { $ref: '#/components/schemas/Money' }
        totalFeatureWin: { $ref: '#/components/schemas/Money' }
        remainingPicks: { type: integer, format: int32 }
        status: { $ref: '#/components/schemas/PickCollectStatus' }

    # ------------------------------------------------------------- slot init
    SlotInitRequest:
      type: object
      required: [gameId, currency]
      properties:
        gameId: { type: string, minLength: 1 }
        currency: { type: string, minLength: 1 }
    SlotInitResponse:
      type: object
      required:
        - sessionId
        - sessionVersion
        - gameId
        - mathVersion
        - currency
        - balance
        - currentState
        - remainingFreeSpins
        - accumulatedFreeSpinsWin
        - availableActions
        - featureFlags
      properties:
        sessionId: { type: string }
        sessionVersion: { type: integer, format: int64 }
        gameId: { type: string }
        mathVersion: { type: string }
        currency: { type: string }
        balance: { $ref: '#/components/schemas/Money' }
        currentState: { $ref: '#/components/schemas/GameState' }
        remainingFreeSpins: { type: integer, format: int32 }
        accumulatedFreeSpinsWin: { $ref: '#/components/schemas/Money' }
        currentBet:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          nullable: true
        availableActions:
          type: array
          items: { $ref: '#/components/schemas/GameCommand' }
        featureFlags:
          type: object
          additionalProperties: { type: boolean }
        activeFeatureView:
          allOf: [{ $ref: '#/components/schemas/PickCollectFeatureView' }]
          nullable: true

    # ------------------------------------------------------------- slot spin
    SpinRequest:
      type: object
      required: [gameId, sessionId, sessionVersion, betSize, powerBetActive]
      properties:
        gameId: { type: string, minLength: 1 }
        sessionId: { type: string, minLength: 1 }
        sessionVersion: { type: integer, format: int64, minimum: 0 }
        betSize: { $ref: '#/components/schemas/Money' }
        powerBetActive: { type: boolean }
    WinLine:
      type: object
      required: [lineId, symbolId, count, payout]
      properties:
        lineId: { type: integer, format: int32 }
        symbolId: { type: integer, format: int32 }
        count: { type: integer, format: int32 }
        payout: { $ref: '#/components/schemas/Money' }
    FeaturesTriggered:
      type: object
      required:
        - freeSpinsAwarded
        - isPowerBetActive
        - pickCollectTriggered
        - bonusBuyExecuted
        - reasonCodes
      properties:
        freeSpinsAwarded: { type: integer, format: int32 }
        isPowerBetActive: { type: boolean }
        pickCollectTriggered: { type: boolean }
        bonusBuyExecuted: { type: boolean }
        reasonCodes:
          type: array
          items: { type: string }
    SessionStateView:
      type: object
      required: [currentState, remainingFreeSpins, accumulatedFreeSpinsWin]
      properties:
        currentState: { $ref: '#/components/schemas/GameState' }
        remainingFreeSpins: { type: integer, format: int32 }
        accumulatedFreeSpinsWin: { $ref: '#/components/schemas/Money' }
    SpinResponse:
      type: object
      required:
        - sessionId
        - sessionVersion
        - roundId
        - mathVersion
        - betDebited
        - totalWin
        - matrix
        - stopPositions
        - winLines
        - featuresTriggered
        - sessionState
        - availableActions
      properties:
        sessionId: { type: string }
        sessionVersion: { type: integer, format: int64 }
        roundId: { type: string }
        mathVersion: { type: string }
        betDebited: { $ref: '#/components/schemas/Money' }
        totalWin: { $ref: '#/components/schemas/Money' }
        matrix:
          type: array
          items:
            type: array
            items: { type: integer, format: int32 }
        stopPositions:
          type: array
          items: { type: integer, format: int32 }
        winLines:
          type: array
          items: { $ref: '#/components/schemas/WinLine' }
        featuresTriggered: { $ref: '#/components/schemas/FeaturesTriggered' }
        sessionState: { $ref: '#/components/schemas/SessionStateView' }
        availableActions:
          type: array
          items: { $ref: '#/components/schemas/GameCommand' }

    # ---------------------------------------------------------- feature/start
    FeatureStartRequest:
      type: object
      required: [gameId, sessionId, sessionVersion, featureType]
      properties:
        gameId: { type: string, minLength: 1 }
        sessionId: { type: string, minLength: 1 }
        sessionVersion: { type: integer, format: int64, minimum: 0 }
        featureType: { $ref: '#/components/schemas/FeatureType' }
    FeatureStartResponse:
      type: object
      required:
        - sessionId
        - sessionVersion
        - currentState
        - remainingFreeSpins
        - availableActions
      properties:
        sessionId: { type: string }
        sessionVersion: { type: integer, format: int64 }
        currentState: { $ref: '#/components/schemas/GameState' }
        remainingFreeSpins: { type: integer, format: int32 }
        accumulatedFreeSpinsWin:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          nullable: true
        activeFeatureView:
          allOf: [{ $ref: '#/components/schemas/PickCollectFeatureView' }]
          nullable: true
        availableActions:
          type: array
          items: { $ref: '#/components/schemas/GameCommand' }

    # ------------------------------------------------------------ feature/buy
    FeatureBuyRequest:
      type: object
      required: [gameId, sessionId, sessionVersion, buyType, betSize]
      properties:
        gameId: { type: string, minLength: 1 }
        sessionId: { type: string, minLength: 1 }
        sessionVersion: { type: integer, format: int64, minimum: 0 }
        buyType: { $ref: '#/components/schemas/BonusBuyType' }
        betSize: { $ref: '#/components/schemas/Money' }
    FeatureBuyResponse:
      type: object
      required:
        - sessionId
        - sessionVersion
        - buyType
        - cost
        - currency
        - enteredState
        - availableActions
      properties:
        sessionId: { type: string }
        sessionVersion: { type: integer, format: int64 }
        buyType: { $ref: '#/components/schemas/BonusBuyType' }
        cost: { $ref: '#/components/schemas/Money' }
        currency: { type: string }
        enteredState: { $ref: '#/components/schemas/GameState' }
        featureInitPayload:
          type: object
          additionalProperties: true
          nullable: true
        activeFeatureView:
          allOf: [{ $ref: '#/components/schemas/PickCollectFeatureView' }]
          nullable: true
        availableActions:
          type: array
          items: { $ref: '#/components/schemas/GameCommand' }

    # ----------------------------------------------------------- feature/pick
    FeaturePickRequest:
      type: object
      required: [gameId, sessionId, sessionVersion, position]
      properties:
        gameId: { type: string, minLength: 1 }
        sessionId: { type: string, minLength: 1 }
        sessionVersion: { type: integer, format: int64, minimum: 0 }
        position: { type: integer, format: int32, minimum: 0 }
    FeaturePickResponse:
      type: object
      required:
        - sessionId
        - sessionVersion
        - position
        - resolvedTileType
        - currentCollected
        - remainingPicks
        - featureCompleted
        - availableActions
      properties:
        sessionId: { type: string }
        sessionVersion: { type: integer, format: int64 }
        position: { type: integer, format: int32 }
        resolvedTileType: { $ref: '#/components/schemas/PickTileType' }
        resolvedValue:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          nullable: true
        currentCollected: { $ref: '#/components/schemas/Money' }
        remainingPicks: { type: integer, format: int32 }
        featureCompleted: { type: boolean }
        featureTotalWin:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          nullable: true
        currentState:
          allOf: [{ $ref: '#/components/schemas/GameState' }]
          nullable: true
        activeFeatureView:
          allOf: [{ $ref: '#/components/schemas/PickCollectFeatureView' }]
          nullable: true
        reasonCodes:
          type: array
          nullable: true
          items: { type: string }
        availableActions:
          type: array
          items: { $ref: '#/components/schemas/GameCommand' }

    # --------------------------------------------------------------- wallet
    WalletAuthenticateRequest:
      type: object
      required: [playerId]
      properties:
        playerId: { type: string, minLength: 1 }
    WalletAuthenticateResponse:
      type: object
      required: [playerId, currency, balance, eligible]
      properties:
        playerId: { type: string }
        currency: { type: string }
        balance: { $ref: '#/components/schemas/Money' }
        eligible: { type: boolean }
    WalletBalanceResponse:
      type: object
      required: [playerId, balance, currency]
      properties:
        playerId: { type: string }
        balance: { $ref: '#/components/schemas/Money' }
        currency: { type: string }
    WalletDebitRequest:
      type: object
      required:
        - playerId
        - sessionId
        - roundId
        - transactionId
        - amount
        - currency
        - transactionType
      properties:
        playerId: { type: string, minLength: 1 }
        sessionId: { type: string, minLength: 1 }
        roundId: { type: string, minLength: 1 }
        transactionId: { type: string, minLength: 1 }
        amount: { $ref: '#/components/schemas/Money' }
        currency: { type: string, minLength: 1 }
        transactionType: { $ref: '#/components/schemas/WalletTransactionType' }
    WalletDebitResponse:
      type: object
      required:
        - transactionId
        - status
        - balanceBefore
        - balanceAfter
        - currency
        - processedAt
        - idempotentReplay
      properties:
        transactionId: { type: string }
        status: { $ref: '#/components/schemas/WalletTransactionStatus' }
        balanceBefore: { $ref: '#/components/schemas/Money' }
        balanceAfter: { $ref: '#/components/schemas/Money' }
        currency: { type: string }
        processedAt: { type: string, format: date-time }
        idempotentReplay: { type: boolean }
    WalletCreditRequest:
      type: object
      required:
        - playerId
        - sessionId
        - roundId
        - transactionId
        - amount
        - currency
        - transactionType
      properties:
        playerId: { type: string, minLength: 1 }
        sessionId: { type: string, minLength: 1 }
        roundId: { type: string, minLength: 1 }
        transactionId: { type: string, minLength: 1 }
        amount: { $ref: '#/components/schemas/Money' }
        currency: { type: string, minLength: 1 }
        transactionType: { $ref: '#/components/schemas/WalletTransactionType' }
    WalletCreditResponse:
      type: object
      required:
        - transactionId
        - status
        - balanceBefore
        - balanceAfter
        - currency
        - processedAt
        - idempotentReplay
      properties:
        transactionId: { type: string }
        status: { $ref: '#/components/schemas/WalletTransactionStatus' }
        balanceBefore: { $ref: '#/components/schemas/Money' }
        balanceAfter: { $ref: '#/components/schemas/Money' }
        currency: { type: string }
        processedAt: { type: string, format: date-time }
        idempotentReplay: { type: boolean }
    WalletRollbackRequest:
      type: object
      required: [playerId, originalTransactionId, transactionId, rollbackReason]
      properties:
        playerId: { type: string, minLength: 1 }
        originalTransactionId: { type: string, minLength: 1 }
        transactionId: { type: string, minLength: 1 }
        rollbackReason: { $ref: '#/components/schemas/RollbackReason' }
    WalletRollbackResponse:
      type: object
      required:
        - transactionId
        - originalTransactionId
        - status
        - processedAt
        - idempotentReplay
      properties:
        transactionId: { type: string }
        originalTransactionId: { type: string }
        status: { $ref: '#/components/schemas/WalletTransactionStatus' }
        processedAt: { type: string, format: date-time }
        idempotentReplay: { type: boolean }

    # -------------------------------------------------------- admin / QA
    SetBalanceRequest:
      type: object
      required: [playerId, currency, balance]
      properties:
        playerId: { type: string, minLength: 1 }
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        balance: { $ref: '#/components/schemas/Money' }
    SetBalanceResponse:
      type: object
      required: [playerId, currency, balance, version, updatedAt]
      properties:
        playerId: { type: string }
        currency: { type: string }
        balance: { $ref: '#/components/schemas/Money' }
        version: { type: integer, format: int64 }
        updatedAt: { type: string, format: date-time }
    SessionInspection:
      type: object
      required:
        - sessionId
        - playerId
        - gameId
        - mathVersion
        - currency
        - currentBet
        - remainingFreeSpins
        - accumulatedFreeSpinsWin
        - sessionVersion
        - createdAt
        - updatedAt
        - cachedInRedis
      properties:
        sessionId: { type: string }
        playerId: { type: string }
        gameId: { type: string }
        mathVersion: { type: string }
        currency: { type: string }
        currentState: { type: string, nullable: true }
        currentBet:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          nullable: true
        remainingFreeSpins: { type: integer, format: int32 }
        accumulatedFreeSpinsWin:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          nullable: true
        nextActionAllowed:
          type: string
          nullable: true
        sessionVersion: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        cachedInRedis: { type: boolean }
        activeFeaturePayload:
          nullable: true
    RoundInspection:
      type: object
      required:
        - roundId
        - sessionId
        - playerId
        - gameId
        - mathVersion
        - betAmount
        - totalWin
        - currency
        - powerBetActive
        - createdAt
      properties:
        roundId: { type: string }
        sessionId: { type: string }
        playerId: { type: string }
        gameId: { type: string }
        mathVersion: { type: string }
        stateContext: { type: string, nullable: true }
        betAmount: { $ref: '#/components/schemas/Money' }
        totalWin: { $ref: '#/components/schemas/Money' }
        currency: { type: string }
        powerBetActive: { type: boolean }
        betTransactionId: { type: string, nullable: true }
        winTransactionId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        matrix:
          nullable: true
        stopPositions:
          nullable: true
        rngDraws:
          nullable: true
        winLines:
          nullable: true
        reasonCodes:
          nullable: true
    RoundReplayResult:
      type: object
      description: |
        Loose envelope until the server exposes the typed `RoundReplayResult`
        record. See `client/openapi/gap-report.md`.
      additionalProperties: true

    # ------------------------------------------------------------ simulator
    RtpSimulationRequest:
      type: object
      required:
        - gameId
        - mathVersion
        - bet
        - spinsBaseGame
        - spinsBonusBuyFreeSpins
        - spinsBonusBuyPickCollect
      properties:
        gameId: { type: string, minLength: 1 }
        mathVersion: { type: string, minLength: 1 }
        bet: { $ref: '#/components/schemas/Money' }
        spinsBaseGame: { type: integer, format: int64, minimum: 0 }
        spinsBonusBuyFreeSpins: { type: integer, format: int64, minimum: 0 }
        spinsBonusBuyPickCollect: { type: integer, format: int64, minimum: 0 }
        pickStrategy:
          allOf: [{ $ref: '#/components/schemas/PickStrategy' }]
          nullable: true
    RtpReportChannel:
      type: object
      required: [spins, totalBet, totalWin, rtpPercent]
      properties:
        spins: { type: integer, format: int64 }
        totalBet: { $ref: '#/components/schemas/Money' }
        totalWin: { $ref: '#/components/schemas/Money' }
        rtpPercent: { $ref: '#/components/schemas/Money' }
    RtpReport:
      type: object
      required:
        - runId
        - gameId
        - mathVersion
        - bet
        - channels
        - overall
        - elapsedMillis
        - generatedAt
        - freeSpinTriggers
        - pickEntries
      properties:
        runId: { type: string }
        gameId: { type: string }
        mathVersion: { type: string }
        bet: { $ref: '#/components/schemas/Money' }
        channels:
          type: object
          additionalProperties: { $ref: '#/components/schemas/RtpReportChannel' }
        overall: { $ref: '#/components/schemas/RtpReportChannel' }
        elapsedMillis: { type: integer, format: int64 }
        generatedAt: { type: string, format: date-time }
        freeSpinTriggers: { type: integer, format: int64 }
        pickEntries: { type: integer, format: int64 }

    # ---------------------------------------------------------------- dev
    DevTokenRequest:
      type: object
      required: [playerId, sessionId, currency]
      properties:
        playerId: { type: string, minLength: 1 }
        sessionId: { type: string, minLength: 1 }
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        roles:
          type: array
          nullable: true
          items: { type: string }
        ttlMinutes:
          type: integer
          format: int64
          minimum: 1
          nullable: true
    DevTokenResponse:
      type: object
      required: [token, expiresAt]
      properties:
        token: { type: string }
        expiresAt: { type: string, format: date-time }
