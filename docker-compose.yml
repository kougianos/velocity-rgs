services:
  postgres:
    image: postgres:16
    container_name: velocity-rgs-postgres
    environment:
      POSTGRES_DB: rgs
      POSTGRES_USER: rgs
      POSTGRES_PASSWORD: rgs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rgs -d rgs"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - rgs-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: velocity-rgs-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  rgs-pgdata:
