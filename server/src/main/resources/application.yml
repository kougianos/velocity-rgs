spring:
  application:
    name: velocity-rgs
  profiles:
    default: demo
  threads:
    virtual:
      enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    url: ${RGS_DB_URL:jdbc:postgresql://localhost:5432/rgs}
    username: ${RGS_DB_USERNAME:rgs}
    password: ${RGS_DB_PASSWORD:rgs}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${RGS_REDIS_HOST:localhost}
      port: ${RGS_REDIS_PORT:6379}
      timeout: 2s

server:
  port: 8080
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

rgs:
  security:
    jwt-secret: ${RGS_JWT_SECRET:change-me-change-me-change-me-change-me-32b}
    jwt-issuer: velocity-rgs
  idempotency:
    redis-cache-enabled: true
    default-ttl-hours: 24
    wallet-ttl-hours: 48
  math:
    catalog:
      - gameId: aztec-fire
        mathVersion: v1

logging:
  level:
    root: INFO
    com.velocity.rgs: INFO
