<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Pinch-zoom left enabled (no maximum-scale / user-scalable=no) for accessibility. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velocity - Round History</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="history-page">
  <header class="vx-top">
    <div class="vx-top-inner">
      <a class="vx-brand" href="/">
        <span class="vx-mark" aria-hidden="true"></span>
        <span class="vx-wordmark">VELO<b>CITY</b></span>
      </a>
      <nav class="vx-nav" aria-label="Primary">
        <a href="/">Lobby</a>
        <a href="/history.html" class="on" aria-current="page">History</a>
      </nav>
      <span class="vx-build" title="Environment">Demo build</span>
    </div>
  </header>

  <main class="history">
    <div class="history-head">
      <div>
        <h2 class="history-title">Round History</h2>
        <p class="history-sub">
          Every spin played by demo player
          <strong id="historyPlayer">-</strong>, most recent first.
        </p>
      </div>
      <div class="history-actions">
        <button id="refreshHistory" class="btn btn-ghost">Refresh</button>
      </div>
    </div>

    <div class="history-summary" id="historySummary"></div>

    <section class="panel history-panel">
      <div id="historyBody">
        <p class="history-loading">Loading round history…</p>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="/games.js"></script>
  <script src="/history.js"></script>
</body>
</html>
